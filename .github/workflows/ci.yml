name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make test
      - run: make smoke

  tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create semantic version tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 <<'PY'
          import os
          import re
          import subprocess
          import sys

          def git(*args):
              return subprocess.check_output(["git", *args], text=True).strip()

          tags = git("tag", "--list", "v[0-9]*.[0-9]*.[0-9]*", "--sort=-v:refname").splitlines()
          latest = tags[0] if tags else ""
          version_re = re.compile(r"^v(\d+)\.(\d+)\.(\d+)$")

          if latest:
              match = version_re.match(latest)
              if not match:
                  print(f"Latest tag {latest!r} is not a supported semantic version tag", file=sys.stderr)
                  sys.exit(1)
              major, minor, patch = map(int, match.groups())
              rev_range = f"{latest}..HEAD"
          else:
              major, minor, patch = 0, 0, 0
              rev_range = "HEAD"

          messages = git("log", "--format=%B%x00", rev_range).split("\x00")
          messages = [message.strip() for message in messages if message.strip()]
          if not messages:
              print("No commits to tag.")
              sys.exit(0)

          bump = "patch"
          for message in messages:
              first = message.splitlines()[0]
              if "BREAKING CHANGE:" in message or re.match(r"^[a-z]+(?:\([^)]+\))?!:", first):
                  bump = "major"
                  break
              if re.match(r"^feat(?:\([^)]+\))?:", first):
                  bump = "minor"

          if latest:
              if bump == "major":
                  major, minor, patch = major + 1, 0, 0
              elif bump == "minor":
                  minor, patch = minor + 1, 0
              else:
                  patch += 1
          else:
              if bump == "major":
                  major, minor, patch = 1, 0, 0
              elif bump == "minor":
                  major, minor, patch = 0, 1, 0
              else:
                  major, minor, patch = 0, 0, 1

          new_tag = f"v{major}.{minor}.{patch}"
          existing = git("tag", "--list", new_tag)
          if existing:
              print(f"{new_tag} already exists.")
              sys.exit(0)

          subprocess.check_call(["git", "config", "user.name", "github-actions[bot]"])
          subprocess.check_call(["git", "config", "user.email", "41898282+github-actions[bot]@users.noreply.github.com"])
          subprocess.check_call(["git", "tag", "-a", new_tag, "-m", new_tag])
          subprocess.check_call(["git", "push", "origin", new_tag])
          print(f"Created {new_tag} from {len(messages)} commit(s).")
          PY
